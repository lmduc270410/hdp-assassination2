    <body>
        <div class="card" style="width: 100%">
            
            
            <div id="mynetwork" class="card-body"></div>
        </div>

        
        
            <div id="config"></div>
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "blue", "id": 0, "label": "P1314", "shape": "dot", "size": 25, "title": "\u806a\u660e\u7684\u8d28\u76d1\u5458\u003cbr\u003ebinary search on answer + prefix sum check"}, {"color": "green", "id": 1, "label": "P8218", "shape": "dot", "size": 25, "title": "Queue Problem\u003cbr\u003esorting + greedy with priority queue"}, {"color": "red", "id": 2, "label": "P1719", "shape": "dot", "size": 25, "title": "\u6700\u5927\u52a0\u6743\u77e9\u5f62\u003cbr\u003efix rows + Kadane"}, {"color": "green", "id": 3, "label": "P2882", "shape": "dot", "size": 25, "title": "Face The Right Way\u003cbr\u003egreedy + difference array"}, {"color": "green", "id": 4, "label": "P4552", "shape": "dot", "size": 25, "title": "IncDec Sequence\u003cbr\u003edifference array balancing"}]);
                  edges = new vis.DataSet([{"from": 0, "title": "sim=0.16", "to": 2, "value": 0.1597835857240767, "width": 5.679613909798128}, {"from": 2, "title": "sim=0.229", "to": 3, "value": 0.22869625908426328, "width": 7.33180348653806}, {"from": 0, "title": "sim=0.006", "to": 4, "value": 0.006307232267192684, "width": 2.0}, {"from": 0, "title": "sim=0.121", "to": 1, "value": 0.12122466508996742, "width": 4.75515918099895}, {"from": 1, "title": "sim=0.033", "to": 2, "value": 0.03289079153036779, "width": 2.6373440092463607}, {"from": 0, "title": "sim=0.275", "to": 3, "value": 0.2745995806684319, "width": 8.432341105543284}, {"from": 1, "title": "sim=0.123", "to": 4, "value": 0.12333673828965704, "width": 4.805796388288821}, {"from": 1, "title": "sim=0.28", "to": 3, "value": 0.28021495299280874, "width": 8.56697032788324}, {"from": 3, "title": "sim=0.34", "to": 4, "value": 0.33998648714380897, "width": 10.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": true,
        "filter": [
            "physics"
        ]
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "barnesHut": {
            "avoidOverlap": 0,
            "centralGravity": 0.3,
            "damping": 0.09,
            "gravitationalConstant": -80000,
            "springConstant": 0.001,
            "springLength": 250
        },
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  
                  // if this network requires displaying the configure window,
                  // put it in its div
                  options.configure["container"] = document.getElementById("config");
                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
